<!-- Profil Pengguna (Siswa / Pelanggan) -->
<!-- data-account-role digunakan sebagai penanda halaman ini milik siswa -->
<div class="flex flex-col lg:flex-row gap-10 min-h-[95vh]" data-account-role="siswa">

  <!-- ── Kiri: Form Profil ─────────────────────────────────────────────── -->
  <section class="w-full lg:w-2/5 bg-[#F4EFE2] p-10 rounded-4xl shadow-2xl self-start">
    <h2 class="text-center text-2xl font-bold mb-8">Profil Pengguna</h2>

    <form id="profile-form" class="flex flex-col items-center">
      <!-- Foto Profil -->
      <div class="relative w-28 h-28 mb-4">
        <div class="w-28 h-28 rounded-full border-4 border-white shadow-lg overflow-hidden bg-white">
          <img
            id="profile-photo"
            src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAyNCAyNCcgZmlsbD0nIzljYTNhZicgc3R5bGU9J2JhY2tncm91bmQtY29sb3I6I2U1ZTdlYjsnPjxwYXRoIGZpbGwtcnVsZT0nZXZlbm9kZCcgZD0nTTcuNSA2YTQuNSA0LjUgMCAxMTkgMCA0LjUgNC41IDAgMDEtOSAwek0zLjc1MSAyMC4xMDVhOC4yNSA4LjI1IDAgMDExNi40OTggMCAuNzUuNzUgMCAwMS0uNDM3LjY5NUExOC42ODMgMTguNjgzIDAgMDExMiAyMi41Yy0yLjc4NiAwLTUuNDMzLS42MDgtNy44MTItMS43YS43NS43NSAwIDAxLS40MzctLjY5NXonIGNsaXAtcnVsZT0nZXZlbm9kZCcgLz48L3N2Zz4="
            alt="Foto profil"
            class="w-full h-full object-cover"
          />
        </div>
        <button
          id="edit-photo-btn"
          type="button"
          class="absolute bottom-0 right-1 bg-[#D2691E] hover:bg-[#B8561A] text-white p-2 rounded-full shadow-lg transition-colors flex items-center justify-center border-2 border-white"
          style="width: 32px; height: 32px;"
          title="Ubah Foto Profil"
        >
          <i data-lucide="camera" class="w-4 h-4 text-white"></i>
        </button>
        <input id="profile-photo-input" type="file" accept="image/*" class="hidden" />
      </div>

      <!-- Data Diri -->
      <div class="w-full space-y-4 mt-6">
        <div class="bg-gray-50 p-3 rounded-lg">
          <label for="profile-name-input" class="text-[10px] text-gray-400">Nama Lengkap:</label>
          <input
            id="profile-name-input"
            type="text"
            class="w-full bg-transparent font-bold text-sm outline-none mt-1"
            placeholder="Nama pengguna"
          />
        </div>

        <div class="bg-gray-50 p-3 rounded-lg">
          <label for="profile-email-input" class="text-[10px] text-gray-400">Email:</label>
          <input
            id="profile-email-input"
            type="email"
            disabled
            class="w-full bg-transparent font-bold text-sm text-gray-500 outline-none mt-1"
          />
        </div>

        <!-- Ganti Password -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="bg-gray-50 p-3 rounded-lg">
            <label for="current-password" class="text-[10px] text-gray-400">Password lama:</label>
            <input
              id="current-password"
              type="password"
              class="w-full bg-transparent font-bold text-sm outline-none mt-1"
              placeholder="Isi jika ingin ubah"
            />
          </div>
          <div class="bg-gray-50 p-3 rounded-lg">
            <label for="new-password" class="text-[10px] text-gray-400">Password baru:</label>
            <input
              id="new-password"
              type="password"
              class="w-full bg-transparent font-bold text-sm outline-none mt-1"
              placeholder="Minimal 6 karakter"
            />
          </div>
        </div>
      </div>

      <p id="profile-message" class="w-full text-sm mt-4 min-h-5"></p>
      <button
        type="submit"
        class="w-full bg-[#D2691E] hover:bg-[#B8561A] text-white py-2 px-4 rounded-lg mt-4 transition-colors font-semibold"
      >
        Simpan perubahan
      </button>
    </form>
  </section>

  <!-- ── Kanan: Notifikasi + Riwayat Pesanan ──────────────────────────── -->
  <section class="w-full lg:flex-1 flex flex-col gap-4">

    <!-- Search + Bell -->
    <div class="flex items-center justify-between gap-3 relative">
      <div class="w-full relative flex items-center">
        <input
          id="search"
          type="text"
          placeholder="Cari riwayat pesanan…"
          class="w-full px-4 py-2 pr-10 rounded-xl outline-none bg-white border border-[#C1500E] focus:ring-2 focus:ring-[#C1500E] transition duration-200 placeholder-gray-400 text-sm"
        />
        <i data-lucide="search" class="absolute right-3 w-4 h-4 text-gray-400 shrink-0 pointer-events-none"></i>
      </div>

      <!-- Notifikasi Bell -->
      <button
        id="notification-btn"
        type="button"
        class="relative shrink-0 w-10 h-10 bg-white flex justify-center items-center rounded-full shadow hover:shadow-md transition-shadow"
      >
        <span
          id="notification-badge"
          class="hidden absolute -top-1 -right-1 min-w-5 h-5 px-1 rounded-full bg-red-500 text-white text-[10px] flex items-center justify-center font-bold"
        >0</span>
        <i data-lucide="bell" class="w-5 h-5 text-gray-500"></i>
      </button>

      <!-- Panel Notifikasi -->
      <div
        id="notification-panel"
        class="hidden absolute right-0 top-12 z-30 w-80 bg-[#F4EFE2] p-4 rounded-2xl shadow-2xl border border-orange-100"
      >
        <h3 class="font-bold text-sm mb-3 text-gray-800">Notifikasi</h3>
        <div id="notification-list" class="space-y-3 max-h-72 overflow-y-auto"></div>
      </div>
    </div>

    <!-- Riwayat Pesanan Harian -->
    <div class="w-full bg-[#F4EFE2] rounded-4xl shadow-2xl flex-1 flex flex-col overflow-hidden min-h-[350px]">
      <!-- Header -->
      <div style="padding:22px 28px 16px;border-bottom:1px solid #EDE5D8;">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:linear-gradient(135deg,#C05A1F,#E8784A);border-radius:10px;">
              <i data-lucide="shopping-bag" class="w-4 h-4 text-white"></i>
            </div>
            <div>
              <h2 style="font-size:16px;font-weight:800;color:#1F2937;margin:0;line-height:1.2;">Riwayat & Status Pesanan</h2>
              <p style="font-size:11px;color:#9E8E84;margin:2px 0 0;">Daftar status pesanan aktif dan transaksi sebelumnya</p>
            </div>
          </div>
          <div id="history-count-badge" style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;background:rgba(192,90,31,0.10);color:#C05A1F;">0 pesanan</div>
        </div>
      </div>
      <!-- List -->
      <div
        id="history-container"
        style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:10px;max-height:62vh;"
      ></div>
    </div>

  </section>
</div>
