<div class="flex flex-col lg:flex-row gap-10 min-h-[95vh]">
  <section class="w-full lg:w-3/5 bg-[#F4EFE2] p-10 rounded-4xl shadow-2xl">
    <h2 class="text-center text-2xl font-bold mb-8">Profil Pengguna</h2>

    <form id="profile-form" class="flex flex-col items-center">
      <div class="relative w-28 h-28 mb-4">
        <div
          class="w-28 h-28 rounded-full border-4 border-white shadow-lg overflow-hidden bg-white"
        >
          <img
            id="profile-photo"
            src="./assets/profile.png"
            alt="Foto profil"
            class="w-full h-full object-cover"
          />
        </div>
        <button
          id="edit-photo-btn"
          type="button"
          class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-[#D2691E] text-white text-xs px-3 py-1 rounded-full shadow"
        >
          Edit Foto
        </button>
        <input
          id="profile-photo-input"
          type="file"
          accept="image/*"
          class="hidden"
        />
      </div>

      <div class="w-full space-y-4 mt-6">
        <div class="bg-gray-50 p-3 rounded-lg">
          <label for="profile-name-input" class="text-[10px] text-gray-400"
            >Nama Lengkap:</label
          >
          <input
            id="profile-name-input"
            type="text"
            class="w-full bg-transparent font-bold text-sm outline-none"
            placeholder="Nama pengguna"
          />
          <p id="profile-name-text" class="sr-only"></p>
        </div>

        <div class="bg-gray-50 p-3 rounded-lg">
          <label for="profile-email-input" class="text-[10px] text-gray-400"
            >Email:</label
          >
          <input
            id="profile-email-input"
            type="email"
            disabled
            class="w-full bg-transparent font-bold text-sm text-gray-500 outline-none"
          />
          <p id="profile-email-text" class="sr-only"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="bg-gray-50 p-3 rounded-lg">
            <label for="current-password" class="text-[10px] text-gray-400"
              >Password lama:</label
            >
            <input
              id="current-password"
              type="password"
              class="w-full bg-transparent font-bold text-sm outline-none"
              placeholder="Isi jika ingin ubah password"
            />
          </div>
          <div class="bg-gray-50 p-3 rounded-lg">
            <label for="new-password" class="text-[10px] text-gray-400"
              >Password baru:</label
            >
            <input
              id="new-password"
              type="password"
              class="w-full bg-transparent font-bold text-sm outline-none"
              placeholder="Minimal 6 karakter"
            />
          </div>
        </div>
      </div>

      <p
        id="profile-message"
        class="w-full text-sm text-[#C1500E] mt-4 min-h-5"
      ></p>
      <button
        type="submit"
        class="w-full bg-[#D2691E] text-white py-2 px-4 rounded-lg mt-4"
      >
        Simpan perubahan
      </button>
    </form>
  </section>

  <section class="w-full lg:w-3/5">
    <div class="flex items-center justify-between gap-5 relative">
      <div class="w-full relative flex items-center">
        <input
          id="search"
          type="text"
          placeholder="Cari riwayat pesanan"
          class="w-full px-4 py-2 pr-10 rounded-xl outline-none bg-white border border-[#C1500E] focus:ring-2 focus:ring-[#C1500E] transition duration-200 placeholder-gray-400"
        />
        <svg
          class="absolute right-3 w-4 h-4 text-gray-400 shrink-0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
      </div>

      <button
        id="notification-btn"
        type="button"
        class="relative w-10 h-10 bg-white flex justify-center items-center rounded-full"
      >
        <span
          id="notification-badge"
          class="hidden absolute -top-1 -right-1 min-w-5 h-5 px-1 rounded-full bg-red-500 text-white text-[10px] flex items-center justify-center"
          >0</span
        >
        <svg
          class="w-4 h-4 text-gray-400"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
      </button>

      <div
        id="notification-panel"
        class="hidden absolute right-0 top-12 z-30 w-80 bg-[#F4EFE2] p-4 rounded-2xl shadow-2xl border border-orange-100"
      >
        <h3 class="font-bold text-sm mb-3">Notifikasi</h3>
        <div
          id="notification-list"
          class="space-y-3 max-h-72 overflow-y-auto"
        ></div>
      </div>
    </div>

    <div class="w-full bg-[#F4EFE2] p-10 rounded-4xl shadow-2xl mt-4">
      <h2 class="text-2xl font-extrabold mb-8">Riwayat Pesanan</h2>
      <div
        id="history-container"
        class="space-y-4 overflow-y-auto h-[61vh] pr-2 [&::-webkit-scrollbar]:w-2 [&::-webkit-scrollbar-thumb]:bg-gray-300 [&::-webkit-scrollbar-thumb]:rounded-full [&::-webkit-scrollbar-track]:bg-transparent"
      ></div>
    </div>
  </section>
</div>
