<!-- Profil Penjual / Owner Kantin -->
<div class="flex flex-col lg:flex-row gap-10 min-h-[95vh]">

  <!-- ── Kiri: Form Profil ─────────────────────────────────────────────── -->
  <section class="w-full lg:w-2/5 bg-[#F4EFE2] p-10 rounded-4xl shadow-2xl self-start">
    <h2 class="text-center text-2xl font-bold mb-8">Profil Penjual</h2>

    <form id="profile-form" class="flex flex-col items-center">
      <!-- Foto Profil -->
      <div class="relative w-28 h-28 mb-4">
        <div class="w-28 h-28 rounded-full border-4 border-white shadow-lg overflow-hidden bg-white">
          <img
            id="profile-photo"
            src="./assets/profile.png"
            alt="Foto profil"
            class="w-full h-full object-cover"
          />
        </div>
        <button
          id="edit-photo-btn"
          type="button"
          class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-[#D2691E] hover:bg-[#B8561A] text-white text-xs px-3 py-1 rounded-full shadow transition-colors"
        >
          Edit Foto
        </button>
        <input id="profile-photo-input" type="file" accept="image/*" class="hidden" />
      </div>

      <!-- Data Diri -->
      <div class="w-full space-y-4 mt-6">
        <div class="bg-gray-50 p-3 rounded-lg">
          <label for="profile-name-input" class="text-[10px] text-gray-400">Nama Lengkap:</label>
          <input
            id="profile-name-input"
            type="text"
            class="w-full bg-transparent font-bold text-sm outline-none mt-1"
            placeholder="Nama penjual"
          />
        </div>

        <div class="bg-gray-50 p-3 rounded-lg">
          <label for="profile-email-input" class="text-[10px] text-gray-400">Email:</label>
          <input
            id="profile-email-input"
            type="email"
            disabled
            class="w-full bg-transparent font-bold text-sm text-gray-500 outline-none mt-1"
          />
        </div>

        <!-- Ganti Password -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          <div class="bg-gray-50 p-3 rounded-lg">
            <label for="current-password" class="text-[10px] text-gray-400">Password lama:</label>
            <input
              id="current-password"
              type="password"
              class="w-full bg-transparent font-bold text-sm outline-none mt-1"
              placeholder="Isi jika ingin ubah"
            />
          </div>
          <div class="bg-gray-50 p-3 rounded-lg">
            <label for="new-password" class="text-[10px] text-gray-400">Password baru:</label>
            <input
              id="new-password"
              type="password"
              class="w-full bg-transparent font-bold text-sm outline-none mt-1"
              placeholder="Minimal 6 karakter"
            />
          </div>
        </div>
      </div>

      <p id="profile-message" class="w-full text-sm mt-4 min-h-5"></p>
      <button
        type="submit"
        class="w-full bg-[#D2691E] hover:bg-[#B8561A] text-white py-2 px-4 rounded-lg mt-4 transition-colors font-semibold"
      >
        Simpan perubahan
      </button>
    </form>
  </section>

  <!-- ── Kanan: Info Kantin + Statistik ──────────────────────────────── -->
  <section class="w-full lg:flex-1 flex flex-col gap-6">

    <!-- Info Kantin -->
    <div class="bg-[#F4EFE2] p-8 rounded-4xl shadow-2xl">
      <h2 class="text-xl font-extrabold mb-6 text-gray-800 flex items-center gap-2">
        <svg class="w-5 h-5 text-[#C1500E]" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
        Informasi Kantin
      </h2>

      <div class="space-y-4">
        <div class="bg-gray-50 p-4 rounded-xl flex items-center justify-between">
          <div>
            <p class="text-[10px] text-gray-400 mb-1">Nama Kantin</p>
            <p id="kantin-name-display" class="font-bold text-gray-800 text-sm">—</p>
          </div>
          <div class="w-10 h-10 bg-[#C1500E]/10 rounded-full flex items-center justify-center">
            <svg class="w-5 h-5 text-[#C1500E]" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
            </svg>
          </div>
        </div>

        <div class="bg-gray-50 p-4 rounded-xl flex items-center justify-between">
          <div>
            <p class="text-[10px] text-gray-400 mb-1">Kode Kantin</p>
            <p id="kantin-code-display" class="font-bold text-gray-800 font-mono text-sm">—</p>
          </div>
          <div class="w-10 h-10 bg-[#C1500E]/10 rounded-full flex items-center justify-center">
            <svg class="w-5 h-5 text-[#C1500E]" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="4" y="4" width="16" height="16" rx="2"/>
              <path d="M9 9h6M9 12h6M9 15h4"/>
            </svg>
          </div>
        </div>

        <div class="bg-gray-50 p-4 rounded-xl flex items-center justify-between">
          <div>
            <p class="text-[10px] text-gray-400 mb-1">Role</p>
            <p id="owner-role-display" class="font-bold text-gray-800 text-sm capitalize">—</p>
          </div>
          <div class="w-10 h-10 bg-[#C1500E]/10 rounded-full flex items-center justify-center">
            <svg class="w-5 h-5 text-[#C1500E]" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Statistik Ringkasan -->
    <div class="bg-[#F4EFE2] p-8 rounded-4xl shadow-2xl">
      <h2 class="text-xl font-extrabold mb-6 text-gray-800 flex items-center gap-2">
        <svg class="w-5 h-5 text-[#C1500E]" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        Statistik Kantin
      </h2>

      <div class="grid grid-cols-2 gap-4">
        <div class="bg-white p-5 rounded-2xl text-center shadow-sm">
          <p id="stat-total-orders" class="text-3xl font-extrabold text-[#C1500E]">—</p>
          <p class="text-xs text-gray-500 mt-1">Total Pesanan</p>
        </div>
        <div class="bg-white p-5 rounded-2xl text-center shadow-sm">
          <p id="stat-active-orders" class="text-3xl font-extrabold text-[#C1500E]">—</p>
          <p class="text-xs text-gray-500 mt-1">Pesanan Aktif</p>
        </div>
        <div class="bg-white p-5 rounded-2xl text-center shadow-sm">
          <p id="stat-done-orders" class="text-3xl font-extrabold text-[#C1500E]">—</p>
          <p class="text-xs text-gray-500 mt-1">Selesai</p>
        </div>
        <div class="bg-white p-5 rounded-2xl text-center shadow-sm">
          <p id="stat-total-revenue" class="text-2xl font-extrabold text-[#C1500E]">—</p>
          <p class="text-xs text-gray-500 mt-1">Total Omzet</p>
        </div>
      </div>
    </div>

  </section>
</div>
