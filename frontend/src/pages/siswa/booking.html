<div class="ml-[30px] mr-20 min-h-screen flex flex-col px-7 py-6">
  <div class="flex items-center justify-between mb-6">
    <h2 id="greetingTextBooking" class="text-[20px] font-bold text-[#2D2D2D]">Hai!</h2>
    <div class="flex items-center gap-3">
      <button
        id="clockBtnBooking"
        onclick="UI.toggleOrderStatus()"
        class="cursor-pointer relative w-9 h-9 rounded-full bg-[#F4EFE2] flex items-center justify-center shadow-md hover:shadow-lg transition"
      >
        <i data-lucide="clock-fading" class="w-4 h-4 text-[#D4622A]"></i>
        <span
          id="clockBadgeBooking"
          class="absolute -top-1 -right-1 w-[14px] h-[14px] rounded-full bg-[#D4622A] text-white text-[8px] font-bold flex items-center justify-center hidden"
        ></span>
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 flex-1">
    <div class="bg-[#F4EFE2] rounded-[22px] p-6 shadow-md flex flex-col">
      <h2 class="text-[22px] font-bold text-[#2D2D2D] mb-1">Form Pemesanan</h2>
      <p class="text-[12px] text-gray-400 mb-5">
        Estimasi pesanan kamu akan jadi dalam
        <span id="estimasiMenit" class="text-[#D4622A] font-semibold"
          >~5 menit</span
        >
        setelah kamu memesan.
      </p>

      <div class="mb-4">
        <input
          type="text"
          id="namaInput"
          placeholder="Nama"
          autocomplete="off"
          class="w-full bg-[#F4EFE2] border border-gray-200 rounded-xl px-4 py-3 text-[12px] outline-none focus:border-[#D4622A] transition"
        />
      </div>

      <div class="mb-5 relative">
        <select
          id="kantinSelect"
          class="w-full bg-[#F4EFE2] border border-gray-200 rounded-xl px-4 py-3 text-[12px] outline-none focus:border-[#D4622A] appearance-none transition cursor-pointer"
        >
          <option value="">Pilih Kantin</option>
        </select>
        <div
          class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-400"
        >
          <i data-lucide="chevron-down" class="w-3 h-3"></i>
        </div>
      </div>

      <div class="mb-4">
        <div class="text-[12px] font-semibold text-[#2D2D2D] mb-3">Item</div>
        <div id="orderItemsList" class="min-h-[80px] space-y-1">
          <div class="text-xs text-gray-400 italic">Belum ada item dipilih</div>
        </div>
      </div>

      <div class="border-t border-gray-200 my-3"></div>

      <div class="flex items-center justify-between mb-1">
        <span class="text-[13px] font-semibold text-[#2D2D2D]">total</span>
        <span id="orderTotal" class="text-[15px] font-bold text-[#D4622A]"
          >Rp 0</span
        >
      </div>
      <p class="text-[11px] text-gray-400 mb-5">
        *bayar makanan langsung di Kantin
      </p>

      <button
        id="pesanBtn"
        class="mt-auto w-full bg-[#D4622A] hover:bg-[#bb5422] text-white py-[13px] rounded-xl text-[12px] font-semibold transition active:scale-[0.98]"
      >
        Pesan Sekarang
      </button>
    </div>

    <div class="bg-[#F4EFE2] rounded-[22px] p-6 shadow-md flex flex-col">
      <div class="flex justify-center items-center gap-3 mb-5">
        <div
          id="menuPanelHeader"
          class="text-[18px] font-bold text-[#2D2D2D] tracking-wide"
        >
          MENU KANTIN
        </div>
      </div>

      <div id="menuGrid" class="grid grid-cols-2 gap-4 flex-1 content-start">
        <div class="col-span-2 text-center py-10 text-gray-400 text-xs italic">
          Pilih kantin untuk melihat menu
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const user = typeof CURRENT_USER !== 'undefined' ? CURRENT_USER : null;
    const greetEl = document.getElementById('greetingTextBooking');
    if (greetEl && user && user.name) {
      greetEl.textContent = 'Hai, ' + user.name + '!';
    } else if (greetEl) {
      greetEl.textContent = 'Hai!';
    }
  })();
</script>
