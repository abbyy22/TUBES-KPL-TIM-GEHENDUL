<div class="flex flex-col gap-3.5 min-h-[calc(100vh-40px)] animate-fadeSlideIn">

  <header class="bg-brand-panel rounded-lg-custom px-8 py-5 flex items-center justify-between gap-6">
    <div>
      <h1 class="text-2xl font-bold text-brand-mid tracking-tight">Kantin NEO 2</h1>
      <p class="text-xs text-brand-muted mt-0.5">Rabu, 7 Mei 2026 · Shift Pagi 07.00–16.00</p>
    </div>
  </header>

  <div class="grid grid-cols-4 gap-3.5">
    <div class="bg-brand-card rounded-lg-custom p-6 flex flex-col gap-1 shadow-sm">
      <div class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"><span
          class="text-brand-primary">&#128196;</span> TOTAL MENU</div>
      <div class="text-3xl font-bold text-brand-mid" id="totalCount">0</div>
    </div>
    <div class="bg-brand-card rounded-lg-custom p-6 flex flex-col gap-1 shadow-sm">
      <div class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"><span
          class="text-brand-primary">&#127835;</span> MAKANAN</div>
      <div class="text-3xl font-bold text-brand-mid" id="foodCount">0</div>
    </div>
    <div class="bg-brand-card rounded-lg-custom p-6 flex flex-col gap-1 shadow-sm">
      <div class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"><span
          class="text-brand-primary">&#129380;</span> MINUMAN</div>
      <div class="text-3xl font-bold text-brand-mid" id="drinkCount">0</div>
    </div>
    <div class="bg-brand-card rounded-lg-custom p-6 flex flex-col gap-1 shadow-sm">
      <div class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"><span
          class="text-brand-primary">&#9888;</span> MENU HABIS</div>
      <div class="text-3xl font-bold text-brand-primary" id="emptyCount">0</div>
    </div>
  </div>

  <section
    class="bg-brand-card rounded-lg-custom overflow-hidden border border-[#DDD0C4]/40 shadow-sm flex flex-col flex-1">

    <div class="flex items-center justify-between p-6 px-8 border-b border-[#DDD0C4]/30">
      <div class="flex items-center gap-2.5">
        <span class="text-brand-primary text-xl select-none">&#9776;</span>
        <h2 class="text-xl font-bold text-brand-mid">Manajemen Menu</h2>
      </div>
      <button onclick="openAdd()"
        class="bg-brand-primary hover:bg-brand-light text-white text-xs font-bold px-5 py-2.5 rounded-xl transition-all flex items-center gap-2">
        <span>&#65291;</span> Tambah Menu Baru
      </button>
    </div>

    <div class="flex items-center justify-between p-4 px-6 bg-brand-bg/20 border-b border-[#DDD0C4]/30">
      <div class="relative flex-1 max-w-sm flex items-center bg-white border border-[#DDD0C4] rounded-xl px-3 py-2">
        <span class="text-brand-muted mr-2">&#128269;</span>
        <input type="search" id="searchInput" placeholder="Cari nama menu..." oninput="onSearch()"
          class="bg-transparent border-none outline-none text-sm text-brand-mid w-full">
      </div>
      <button
        class="text-sm font-semibold text-brand-mid border border-[#DDD0C4] px-4 py-1.5 rounded-xl bg-white">Filter</button>
    </div>

    <div class="overflow-x-auto flex-1">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr
            class="bg-brand-bg/40 text-brand-mid text-xs font-bold uppercase tracking-wider border-b border-[#DDD0C4]/20">
            <th class="p-4 px-6">Menu</th>
            <th class="p-4 px-6 text-center">Kategori</th>
            <th class="p-4 px-6 text-right">Harga</th>
            <th class="p-4 px-6 text-center">Status</th>
            <th class="p-4 px-6 text-right">Aksi</th>
          </tr>
        </thead>
        <tbody id="menuTbody" class="divide-y divide-[#DDD0C4]/10 text-sm text-brand-mid"></tbody>
      </table>
      <div id="emptyState" class="hidden text-center py-12 text-brand-muted">
        <span class="text-3xl">&#128270;</span>
        <p class="text-sm font-bold mt-2">Menu tidak ditemukan</p>
      </div>
    </div>

    <div class="flex items-center justify-between p-4 px-6 bg-brand-bg/30 border-t border-[#DDD0C4]/30">
      <p id="footInfo" class="text-xs text-brand-muted"></p>
      <div class="flex gap-2">
        <button onclick="changePage(-1)"
          class="text-xs font-bold border border-[#DDD0C4] bg-white text-brand-mid px-4 py-2 rounded-xl">Sebelumnya</button>
        <button onclick="changePage(1)"
          class="text-xs font-bold bg-brand-primary text-white px-4 py-2 rounded-xl">Berikutnya</button>
      </div>
    </div>
  </section>
</div>

<div id="modalOverlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center">
  <div class="bg-brand-sidebar rounded-lg-custom p-6 w-full max-w-sm border border-black/10 shadow-xl"
    onclick="event.stopPropagation()">
    <div class="text-base font-bold text-brand-mid mb-4 flex items-center gap-2">
      <span>&#9998;</span> <span id="modalHeading">Tambah Menu Baru</span>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-[10px] font-bold text-brand-muted uppercase tracking-wider mb-2">Foto Menu</label>
        <div class="flex gap-4 items-start">
          <div id="uploadZone" onclick="document.getElementById('fImageFile').click()"
            class="w-24 h-24 bg-white border-2 border-dashed border-[#DDD0C4] rounded-xl flex items-center justify-center overflow-hidden cursor-pointer shrink-0 relative">
            <img id="fImagePreview" src="" class="w-full h-full object-fit-cover hidden" alt="Preview" />
            <div id="fImagePlaceholder" class="text-center text-brand-muted flex flex-col items-center">
              <span class="text-xl">&#128247;</span>
              <span class="text-[9px] font-semibold mt-1">Pilih Foto</span>
            </div>
          </div>
          <input type="file" id="fImageFile" accept="image/*" class="hidden" onchange="handleImageUpload(event)" />
          <div class="flex flex-col gap-1.5 pt-2">
            <button type="button" onclick="document.getElementById('fImageFile').click()"
              class="border border-[#DDD0C4] bg-white px-3 py-1.5 text-xs font-semibold rounded-lg text-brand-mid">Unggah</button>
            <button type="button" id="btnRemoveImg" onclick="removeImage()"
              class="text-xs font-semibold text-red-500 hidden">Hapus Foto</button>
          </div>
        </div>
      </div>
      <div>
        <label class="block text-[10px] font-bold text-brand-muted uppercase tracking-wider mb-1">Nama Menu</label>
        <input type="text" id="fName" placeholder="Contoh: Nasi Goreng"
          class="w-full text-sm bg-white border border-[#DDD0C4] rounded-xl px-4 py-2 outline-none text-brand-mid">
      </div>
      <div>
        <label class="block text-[10px] font-bold text-brand-muted uppercase tracking-wider mb-1">Deskripsi</label>
        <input type="text" id="fDesc" placeholder="Varian rasa"
          class="w-full text-sm bg-white border border-[#DDD0C4] rounded-xl px-4 py-2 outline-none text-brand-mid">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-[10px] font-bold text-brand-muted uppercase tracking-wider mb-1">Kategori</label>
          <select id="fCat"
            class="w-full text-sm bg-white border border-[#DDD0C4] rounded-xl px-3 py-2 outline-none text-brand-mid">
            <option value="food">Makanan</option>
            <option value="drink">Minuman</option>
          </select>
        </div>
        <div>
          <label class="block text-[10px] font-bold text-brand-muted uppercase tracking-wider mb-1">Harga (Rp)</label>
          <input type="number" id="fPrice" placeholder="15000"
            class="w-full text-sm bg-white border border-[#DDD0C4] rounded-xl px-4 py-2 outline-none text-brand-mid">
        </div>
      </div>
    </div>
    <div class="flex justify-end gap-2 mt-6">
      <button onclick="closeModal()"
        class="px-4 py-2 rounded-xl text-xs font-bold border border-[#DDD0C4] bg-white text-brand-mid">Batal</button>
      <button onclick="saveMenu()"
        class="px-5 py-2 rounded-xl text-xs font-bold bg-brand-primary text-white">Simpan</button>
    </div>
  </div>
</div>

<div id="delOverlay" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center">
  <div class="bg-brand-sidebar rounded-lg-custom p-6 w-full max-w-xs text-center border border-black/10 shadow-xl"
    onclick="event.stopPropagation()">
    <span class="text-red-500 text-3xl block mb-2">&#128465;</span>
    <h3 class="text-base font-bold text-brand-mid mb-1">Hapus Menu?</h3>
    <p id="delSub" class="text-xs text-brand-muted mb-5">Tindakan ini tidak dapat dibatalkan.</p>
    <div class="flex justify-center gap-2">
      <button onclick="closeDel()"
        class="px-4 py-2 border border-[#DDD0C4] bg-white rounded-xl text-xs font-bold text-brand-mid">Batal</button>
      <button onclick="confirmDel()" class="px-5 py-2 bg-red-500 rounded-xl text-xs font-bold text-white">Ya,
        Hapus</button>
    </div>
  </div>
</div>

<div id="toast" class="fixed bottom-6 right-6 z-50 opacity-0 pointer-events-none transition-all duration-300"></div>

<script>
  (() => {
    if (typeof renderMenu === 'function') {
      renderMenu();
    } else {
      const script = document.createElement('script');
      script.src = "./js/edit-menu.js";
      script.onload = () => { if (typeof renderMenu === 'function') renderMenu(); };
      document.body.appendChild(script);
    }
  })();
</script>
