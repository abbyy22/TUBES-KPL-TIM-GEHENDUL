<div class="flex flex-col gap-3.5 min-h-[calc(100vh-40px)] animate-fadeSlideIn">
  <header
    class="bg-brand-panel rounded-lg-custom px-8 py-5 flex items-center gap-6"
  >
    <div class="flex-1">
      <h1
        id="kantin-title"
        class="text-2xl font-bold text-brand-mid tracking-tight"
      >
        Dashboard Kantin
      </h1>
      <p id="dashboard-date" class="text-xs text-brand-muted mt-0.5"></p>
    </div>
  </header>

  <main class="flex flex-col gap-3.5 flex-1">
    <div class="grid grid-cols-4 gap-3.5">
      <div
        class="bg-brand-card rounded-lg-custom p-5 flex flex-col gap-0.5 shadow-sm"
      >
        <div class="text-2xl font-bold text-brand-mid" id="stat-pesanan">0</div>
        <div class="text-xs text-brand-muted font-medium">Pesanan</div>
      </div>
      <div
        class="bg-brand-card rounded-lg-custom p-5 flex flex-col gap-0.5 shadow-sm"
      >
        <div class="text-2xl font-bold text-brand-mid" id="stat-dimasak">0</div>
        <div class="text-xs text-brand-muted font-medium">Dimasak</div>
      </div>
      <div
        class="bg-brand-card rounded-lg-custom p-5 flex flex-col gap-0.5 shadow-sm"
      >
        <div class="text-2xl font-bold text-brand-mid" id="stat-siap">0</div>
        <div class="text-xs text-brand-muted font-medium">Siap Diambil</div>
      </div>
      <div
        class="bg-brand-card rounded-lg-custom p-5 flex flex-col gap-0.5 shadow-sm"
      >
        <div class="text-2xl font-bold text-brand-mid" id="stat-selesai">0</div>
        <div class="text-xs text-brand-muted font-medium">Selesai</div>
      </div>
    </div>


    <div class="grid grid-cols-4 gap-3.5 items-start flex-1" id="kanban"></div>
  </main>
</div>

<div
  class="fixed bottom-6 right-6 z-50 bg-brand-mid text-white font-bold text-xs p-3 px-5 rounded-xl border border-black/10 shadow-lg hidden opacity-0 transition-all duration-300"
  id="toast"
></div>

<script>
  (() => {
    const STATUSES = ["Pesanan", "Dimasak", "Siap Diambil", "Selesai"];
    const API_STATUSES = ["ORDERED", "COOKING", "READY", "DONE"];
    const NEXT_BTN = ["Mulai Masak", "Siap Diambil", "Selesai", "Selesai"];
    const IS_FINAL = [false, false, false, true];

    window.orders = window.orders || [
      {
        id: "001",
        time: "18.07",
        items: "Nasi goreng, Es teh x 1",
        status: 0,
        meja: "",
      },
      {
        id: "001b",
        time: "18.07",
        items: "Nasi goreng, Es teh x 1",
        status: 0,
        meja: "",
      },
      { id: "002", time: "18.11", items: "Serbu 1 x 1", status: 1, meja: "" },
      {
        id: "003",
        time: "18.15",
        items: "Soto Ayam, Es teh x 1",
        status: 2,
        meja: "",
      },
      {
        id: "004",
        time: "18.59",
        items: "Nasi rames x4, Jus jeruk x3",
        status: 3,
        meja: "",
      },
    ];
    window.counter = window.counter || 5;

    window.render = function (filter = "") {
      updateStats();
      const kanban = document.getElementById("kanban");
      if (!kanban) return;
      kanban.innerHTML = "";

      STATUSES.forEach((status, si) => {
        const col = document.createElement("div");
        col.className =
          "flex flex-col gap-3 p-4 rounded-lg-custom min-h-[400px]";
        col.style.cssText =
          "background:#F7F2EA;border:1px solid rgba(221,208,196,0.2);";

        const filtered = orders.filter(
          (o) =>
            o.status === si &&
            (filter === "" ||
              o.items.toLowerCase().includes(filter.toLowerCase()) ||
              o.id.includes(filter)),
        );

        col.innerHTML = `
          <div class="flex items-center justify-between p-3 px-4 rounded-xl text-sm font-bold shadow-sm"
               style="background-color:#C05A1F;color:#ffffff;">
            <span>${status}</span>
            <span style="background:rgba(255,255,255,0.2);padding:2px 8px;border-radius:999px;font-size:11px;">${filtered.length}</span>
          </div>
        `;

        if (filtered.length === 0) {
          col.innerHTML += `<p style="text-align:center;padding:40px 0;font-size:12px;color:#9E8E84;font-style:italic;">Tidak ada pesanan</p>`;
        }

        filtered.forEach((o) => {
          const card = document.createElement("div");
          card.className =
            "p-4 rounded-xl shadow-sm flex flex-col gap-2 transition-transform hover:-translate-y-0.5 duration-150";
          card.style.cssText = "background:#ffffff;border:1px solid #DDD0C4;";
          const isFinal = IS_FINAL[si];

          card.innerHTML = `
            <div class="flex justify-between items-center text-xs">
              <span class="font-bold font-mono" style="color:#C05A1F">#${o.id}</span>
              <span style="color:#9E8E84">${o.time}</span>
            </div>
            <p class="text-sm font-semibold leading-snug" style="color:#6B5E54">${o.items}</p>
            <button
              class="w-full text-xs font-bold py-2 mt-1 rounded-lg transition-all"
              style="
                background-color: ${isFinal ? "#EDE5D8" : "#C05A1F"};
                color: ${isFinal ? "#9E8E84" : "#ffffff"};
                cursor: ${isFinal ? "not-allowed" : "pointer"};
              "
              ${isFinal ? "disabled" : `onclick="advance('${o.id}')" onmouseover="this.style.backgroundColor='#E8784A'" onmouseout="this.style.backgroundColor='#C05A1F'"`}
            >${NEXT_BTN[si]}</button>
          `;
          col.appendChild(card);
        });
        kanban.appendChild(col);
      });
    };

    window.updateStats = function () {
      if (!document.getElementById("stat-pesanan")) return;
      document.getElementById("stat-pesanan").textContent = orders.filter(
        (o) => o.status === 0,
      ).length;
      document.getElementById("stat-dimasak").textContent = orders.filter(
        (o) => o.status === 1,
      ).length;
      document.getElementById("stat-siap").textContent = orders.filter(
        (o) => o.status === 2,
      ).length;
      document.getElementById("stat-selesai").textContent = orders.filter(
        (o) => o.status === 3,
      ).length;
    };

    window.advance = async function (id) {
      const o = orders.find((o) => o.id === id);
      if (!o || o.status >= 3) return;

      try {
        if (window.ApiClient && ApiClient.isAuthenticated() && o.backendId) {
          await ApiClient.updateOrderStatus(
            o.backendId,
            API_STATUSES[o.status + 1],
          );
        }
        o.status++;
        render();
        showToast("Status pesanan diperbarui ✓");
      } catch (err) {
        showToast(err.message || "Gagal memperbarui status");
      }
    };

    window.openModal = function () {
      const menu = document.getElementById("inp-menu").value.trim();
      const jml = document.getElementById("inp-jml").value.trim();
      const meja = document.getElementById("inp-meja").value.trim();
      if (menu) {
        document.getElementById("m-menu").value = menu;
      }
      if (jml) document.getElementById("m-jml").value = jml;
      if (meja) document.getElementById("m-meja").value = meja;
      document.getElementById("modal").classList.remove("hidden");
    };

    window.closeModal = function () {
      const modal = document.getElementById("modal");
      if (!modal) return;
      modal.classList.add("hidden");
    };

    window.addOrder = function () {
      const menu = document.getElementById("m-menu").value.trim();
      menu.disabled = true;
      const jml = document.getElementById("m-jml").value.trim();
      jml.disabled = true;
      const meja = document.getElementById("m-meja").value.trim();
      meja.disabled = true;
      if (!menu) {
        document.getElementById("m-menu").focus();
        return;
      }

      const itemStr = jml ? `${menu} x ${jml}` : menu;
      function pad(n) {
        return String(n).padStart(3, "0");
      }
      function getTime() {
        const d = new Date();
        return d.getHours() + "." + String(d.getMinutes()).padStart(2, "0");
      }

      orders.push({
        id: pad(counter++),
        time: getTime(),
        items: itemStr,
        status: 0,
        meja,
      });
      ["inp-menu", "inp-jml", "inp-meja", "m-menu", "m-jml", "m-meja"].forEach(
        (id) => {
          document.getElementById(id).value = "";
        },
      );
      closeModal();
      render();
      showToast("Pesanan #" + pad(counter - 1) + " ditambahkan ✓");
    };

    window.showToast = function (msg) {
      const t = document.getElementById("toast");
      if (!t) return;
      t.innerText = msg;
      t.classList.remove("hidden", "opacity-0");
      setTimeout(() => {
        t.classList.add("opacity-0");
      }, 2200);
    };

    function formatOrderTime(value) {
      if (!value) return "";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return date
        .toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit",
        })
        .replace(":", ".");
    }

    function formatOrderItems(order) {
      if (Array.isArray(order.items) && order.items.length > 0) {
        return order.items
          .map((item) => `${item.menu_name} x ${item.quantity}`)
          .join(", ");
      }
      return order.customer_name
        ? `Pesanan ${order.customer_name}`
        : `Order #${order.id}`;
    }

    function mapBackendOrder(order) {
      const statusIndex = API_STATUSES.indexOf(order.status);
      return {
        id: String(order.id),
        backendId: order.id,
        time: formatOrderTime(order.created_at),
        items: formatOrderItems(order),
        status: statusIndex >= 0 ? statusIndex : 0,
        meja: "",
      };
    }

    async function loadBackendOrders() {
      if (!window.ApiClient || !ApiClient.isAuthenticated()) return false;
      const user = ApiClient.getUser();
      if (ApiClient.normalizeRole(user?.role) !== "owner") return false;

      let summaries = [];
      if (user.kantin_id) {
        // Penjual: hanya ambil pesanan kantin miliknya
        summaries = await ApiClient.getOrderByKantin(user.kantin_id);
      } else {
        // Admin tanpa kantin_id: lihat semua pesanan
        summaries = await ApiClient.listAllOrders();
      }

      // Fetch detail (termasuk items) untuk setiap pesanan
      const details = await Promise.all(
        summaries.map((order) =>
          ApiClient.getOrder(order.id).catch(() => order),
        ),
      );
      orders = details.map(mapBackendOrder);
      return true;
    }

    // Set judul kantin dari user session
    (() => {
      const user =
        window.ApiClient && ApiClient.getUser ? ApiClient.getUser() : null;
      const titleEl = document.getElementById("kantin-title");
      if (titleEl && user) {
        titleEl.textContent = user.kantin_name || user.name || "Kantin";
      }
    })();

    window.initKanban = async function () {
      try {
        await loadBackendOrders();
      } catch (err) {
        console.warn(
          "[update_status] Gagal ambil order dari API, pakai data lokal:",
          err.message,
        );
      }
      render();

      // Real-time: listen to socket order:status events
      // socket is set up in index.html parent scope
      if (window.socket) {
        window.socket.off("order:status"); // prevent duplicate listeners
        window.socket.on("order:status", async (payload) => {
          console.log(
            "[update_status] socket order:status →",
            payload.orderId,
            payload.status,
          );
          try {
            await loadBackendOrders();
          } catch (e) {
            // fallback: update local array if backend fails
            const o = orders.find(
              (x) =>
                x.backendId === payload.orderId ||
                String(x.id) === String(payload.orderId),
            );
            if (o) {
              const idx = API_STATUSES.indexOf(payload.status);
              if (idx >= 0) o.status = idx;
            }
          }
          render();
          showToast(`Pesanan #${payload.orderId} → ${payload.status}`);
        });
      }
    };
  })();
</script>
