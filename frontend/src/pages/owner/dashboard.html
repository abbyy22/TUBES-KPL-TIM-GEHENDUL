<div class="flex flex-col gap-3.5 min-h-[calc(100vh-40px)]">
  <header
    class="bg-brand-panel rounded-lg-custom px-8 py-5 flex items-center gap-6"
  >
    <div class="flex-1">
      <h1
        id="kantin-title"
        class="text-2xl font-bold text-brand-mid tracking-tight"
      >
        Dashboard Kantin
      </h1>
      <p id="dashboard-date" class="text-xs text-brand-muted mt-0.5"></p>
    </div>
    <div
      class="flex items-center gap-2.5 bg-brand-bg border border-[#DDD0C4] rounded-full px-5 py-2.5 w-80 transition-colors focus-within:border-brand-primary"
    >
      <i data-lucide="search" class="w-4 h-4 text-[#7a6555]"></i>
      <input
        id="dashSearch"
        class="border-none bg-transparent outline-none text-sm text-brand-mid w-full placeholder-brand-muted"
        type="text"
        placeholder="Cari pesanan..."
        oninput="filterDashOrders()"
      />
    </div>
    <button
      class="w-10 h-10 rounded-full border border-[#DDD0C4] bg-brand-bg flex items-center justify-center relative transition-all hover:border-brand-primary hover:bg-white"
      title="Refresh"
      onclick="loadDashboard()"
    >
      <i data-lucide="refresh-cw" class="w-4 h-4 text-[#7a6555]"></i>
    </button>
  </header>

  <main class="flex flex-col gap-3.5 flex-1">
    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3.5">
      <div class="bg-brand-card rounded-lg-custom p-7 pb-5 flex flex-col gap-2">
        <div
          class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"
        >
          <i
            data-lucide="dollar-sign"
            class="w-4 h-4 text-brand-primary shrink-0"
          ></i>
          Omzet hari ini
        </div>
        <div
          id="omzet-hari-ini"
          class="text-4xl font-bold text-brand-mid tracking-tighter leading-[1.1]"
        >
          Rp 0
        </div>
        <div class="text-xs text-brand-muted">Total pendapatan hari ini</div>
      </div>
      <div class="bg-brand-card rounded-lg-custom p-7 pb-5 flex flex-col gap-2">
        <div
          class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"
        >
          <i
            data-lucide="shopping-cart"
            class="w-4 h-4 text-brand-primary shrink-0"
          ></i>
          Total Transaksi
        </div>
        <div
          id="total-transaksi"
          class="text-4xl font-bold text-brand-mid tracking-tighter leading-[1.1]"
        >
          0
        </div>
        <div class="text-xs text-brand-muted">Semua pesanan masuk</div>
      </div>
      <div class="bg-brand-card rounded-lg-custom p-7 pb-5 flex flex-col gap-2">
        <div
          class="flex items-center gap-1.5 text-xs font-medium text-brand-muted"
        >
          <i
            data-lucide="clock"
            class="w-4 h-4 text-brand-primary shrink-0"
          ></i>
          Antrian aktif
        </div>
        <div
          id="antrian-aktif"
          class="text-4xl font-bold text-brand-mid tracking-tighter leading-[1.1]"
        >
          0
        </div>
        <div class="text-xs text-brand-muted">Pesanan sedang diproses</div>
      </div>
    </div>

    <!-- Recent Orders -->
    <section class="bg-brand-panel rounded-lg-custom p-7 pb-6 flex-1">
      <div class="flex items-center justify-between gap-3.5 mb-5">
        <div class="flex items-center gap-3.5">
          <i data-lucide="list" class="w-5 h-5 text-brand-primary shrink-0"></i>
          <h2 class="text-2xl font-bold text-brand-mid tracking-tight">
            Pesanan Masuk
          </h2>
        </div>
        <span id="dash-loading" class="text-xs text-brand-muted hidden"
          >Memuat...</span
        >
      </div>

      <div id="dash-orders-list" class="flex flex-col gap-2.5">
        <p class="text-sm text-brand-muted italic text-center py-8">
          Memuat data pesanan...
        </p>
      </div>
    </section>
  </main>
</div>

<script>
  (() => {
    const STATUS_LABEL = {
      ORDERED: "Baru",
      COOKING: "Dimasak",
      READY: "Siap Ambil",
      DONE: "Selesai",
    };
    const STATUS_COLOR = {
      ORDERED: "background:#FEF3EC;color:#C05A1F;",
      COOKING: "background:#FFF7ED;color:#EA580C;",
      READY: "background:#F0FDF4;color:#16A34A;",
      DONE: "background:#F1F5F9;color:#64748B;",
    };

    let allOrders = [];

    function formatRp(n) {
      return "Rp " + Number(n).toLocaleString("id-ID");
    }
    function formatTime(val) {
      if (!val) return "";
      const d = new Date(val);
      return isNaN(d)
        ? ""
        : d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" });
    }
    function formatDate() {
      return new Date().toLocaleDateString("id-ID", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric",
      });
    }

    window.filterDashOrders = function () {
      const q = (
        document.getElementById("dashSearch")?.value || ""
      ).toLowerCase();
      renderOrderList(
        q
          ? allOrders.filter(
              (o) =>
                (o.customer_name || "").toLowerCase().includes(q) ||
                String(o.id).includes(q),
            )
          : allOrders,
      );
    };

    function renderOrderList(orders) {
      const container = document.getElementById("dash-orders-list");
      if (!container) return;

      if (orders.length === 0) {
        container.innerHTML = `<p class="text-sm text-brand-muted italic text-center py-8">Belum ada pesanan masuk</p>`;
        return;
      }

      container.innerHTML = orders
        .slice(0, 20)
        .map(
          (o) => `
        <div class="flex items-center gap-[18px] p-4 px-6 bg-brand-bg rounded-md-custom cursor-pointer transition-all hover:shadow-custom-hover hover:-translate-y-[1px]">
          <span class="text-sm font-bold text-brand-muted w-10 shrink-0">#${o.id}</span>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-bold text-brand-mid mb-0.5">${o.customer_name || "Pelanggan"}</div>
            <div class="text-xs text-brand-muted">${formatTime(o.created_at)}</div>
          </div>
          <span class="text-sm font-bold text-brand-mid shrink-0 whitespace-nowrap">${formatRp(o.total_price)}</span>
          <span class="py-1.5 px-5 rounded-full text-xs font-semibold shrink-0 min-w-[90px] text-center" style="${STATUS_COLOR[o.status] || STATUS_COLOR.ORDERED}">${STATUS_LABEL[o.status] || o.status}</span>
        </div>
      `,
        )
        .join("");
    }

    function updateStats(orders) {
      const today = new Date();
      const todayOrders = orders.filter((o) => {
        const d = new Date(o.created_at);
        return (
          d.getDate() === today.getDate() &&
          d.getMonth() === today.getMonth() &&
          d.getFullYear() === today.getFullYear()
        );
      });

      const omzet = todayOrders.reduce((s, o) => s + Number(o.total_price), 0);
      const antrian = orders.filter(
        (o) => o.status === "ORDERED" || o.status === "COOKING",
      ).length;

      const omzetEl = document.getElementById("omzet-hari-ini");
      const totalEl = document.getElementById("total-transaksi");
      const antrianEl = document.getElementById("antrian-aktif");

      if (omzetEl) omzetEl.textContent = formatRp(omzet);
      if (totalEl) totalEl.textContent = orders.length;
      if (antrianEl) antrianEl.textContent = antrian;
    }

    window.loadDashboard = async function () {
      const loadingEl = document.getElementById("dash-loading");
      if (loadingEl) loadingEl.classList.remove("hidden");
      try {
        const user = ApiClient.getUser();

        // Set judul & tanggal
        const titleEl = document.getElementById("kantin-title");
        if (titleEl)
          titleEl.textContent =
            user?.kantin_name || user?.name || "Dashboard Kantin";
        const dateEl = document.getElementById("dashboard-date");
        if (dateEl) dateEl.textContent = formatDate();

        let orders = [];
        if (user?.kantin_id) {
          orders = await ApiClient.getOrderByKantin(user.kantin_id);
        } else {
          orders = await ApiClient.listAllOrders();
        }
        allOrders = orders;
        updateStats(orders);
        renderOrderList(orders);
      } catch (err) {
        console.error("[dashboard] Gagal load:", err);
        const container = document.getElementById("dash-orders-list");
        if (container)
          container.innerHTML = `<p class="text-sm text-red-500 italic text-center py-8">Gagal memuat: ${err.message}</p>`;
      } finally {
        if (loadingEl) loadingEl.classList.add("hidden");
        if (typeof lucide !== "undefined") lucide.createIcons();
      }
    };

    // Auto-load saat script dieksekusi
    window.loadDashboard();

    // Real-time: refresh stats saat ada order baru atau status berubah
    if (window.socket) {
      window.socket.on("order:status", () => window.loadDashboard());
    }
  })();
</script>
