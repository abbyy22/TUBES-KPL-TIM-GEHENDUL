<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>telFood - Smart Canteen</title>
    <link href="./output.css" rel="stylesheet" />
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                bg: "#EDE5D8",
                sidebar: "#F7F2EA",
                card: "#F7F2EA",
                panel: "#F7F2EA",
                primary: "#C05A1F",
                light: "#E8784A",
                mid: "#6B5E54",
                muted: "#9E8E84",
              },
            },
            borderRadius: {
              "lg-custom": "22px",
              "md-custom": "16px",
              "sm-custom": "10px",
            },
            boxShadow: {
              custom: "0 2px 12px rgba(0, 0, 0, 0.06)",
              "custom-hover": "0 6px 24px rgba(0, 0, 0, 0.10)",
            },
          },
        },
      };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      .sidebar-nav a.active-menu {
        color: #c1500e !important;
        font-weight: 600;
      }
    </style>
  </head>

  <body class="bg-[#F0E8D5] transition-colors">
    <div id="sidebar-placeholder"></div>

    <main id="main-content" class="ml-72 p-8 min-h-screen">
      <div id="page-loader" class="flex justify-center items-center h-full">
        <p>Memuat halaman...</p>
      </div>
    </main>

    <div
      id="orderStatusOverlay"
      class="hidden fixed inset-0 z-[200] items-center justify-end p-6 pointer-events-none"
    ></div>

    <script src="./js/api.js"></script>
    <script src="./js/siswa/utils.js"></script>
    <script src="./js/siswa/menuTable.js"></script>
    <script src="./js/siswa/orderStateMachine.js"></script>
    <script src="./js/siswa/cart.js"></script>
    <script src="./js/siswa/ui.js"></script>

    <script src="./js/owner/edit-menu.js"></script>

    <script src="./js/siswa/dashSiswa.js"></script>
    <script src="./js/siswa/booking.js"></script>

    <script>
      if (!ApiClient.isAuthenticated()) {
        window.location.href = "./pages/auth/login.html";
      }

      const CURRENT_USER = ApiClient.getUser();
      // const CURRENT_ROLE = ApiClient.normalizeRole(CURRENT_USER?.role);
      const CURRENT_ROLE = ApiClient.normalizeRole(CURRENT_USER?.role);

      // ─── Socket.io connection for real-time order updates ────────────────────
      window.socket = null;
      try {
        // Derive socket URL from API base (strip /api suffix)
        const socketUrl = ApiClient.getBaseUrl().replace(/\/api$/, "");
        window.socket = io(socketUrl);
        window.socket.on("connect", () =>
          console.log(
            "[socket.io] connected to",
            socketUrl,
            ":",
            window.socket.id,
          ),
        );
        window.socket.on("disconnect", () =>
          console.log("[socket.io] disconnected"),
        );
        window.socket.on("connect_error", (err) =>
          console.warn("[socket.io] connection error:", err.message),
        );

        // Real-time menu update – penjual ubah menu → pelanggan refresh otomatis
        window.socket.on("menu:updated", async (payload) => {
          console.log("[socket.io] menu:updated received:", payload);
          // Reload menu table agar perubahan penjual langsung terlihat pelanggan
          try {
            await MenuTable.loadFromApi();
          } catch (e) {
            console.warn("[socket.io] Gagal reload MenuTable:", e.message);
          }
          // Re-render booking page jika sedang ditampilkan
          const kantinSelect = document.getElementById("kantinSelect");
          if (kantinSelect) {
            booking.renderKantinSelect();
            booking.renderMenuGrid(kantinSelect.value || "");
          }
        });

        // Real-time order status – notify pelanggan
        window.socket.on("order:status", (payload) => {
          console.log("[socket.io] order:status received:", payload);
          // If kanban (owner status page) is rendered, refresh it
          if (
            typeof window.render === "function" &&
            typeof window.orders !== "undefined"
          ) {
            // reload from backend to get fresh data
            if (typeof window.initKanban === "function") {
              window.initKanban();
            } else {
              window.render();
            }
          }
          // If siswa is watching an order status overlay, update it
          if (
            typeof OrderStateMachine !== "undefined" &&
            typeof UI !== "undefined"
          ) {
            // Hanya update jika ini adalah pesanan aktif milik pelanggan ini
            const activeId = OrderStateMachine.getActiveOrderId
              ? OrderStateMachine.getActiveOrderId()
              : null;
            const isMyOrder =
              activeId && String(activeId) === String(payload.orderId);

            if (
              isMyOrder ||
              OrderStateMachine.getState() !== OrderStateMachine.STATES.IDLE
            ) {
              const newState = payload.status;
              try {
                OrderStateMachine.forceState(newState);
                // Re-render status card
                if (
                  typeof UI !== "undefined" &&
                  typeof UI.renderOrderStatus === "function"
                ) {
                  const ordData = payload.order || {};
                  const itemSummary =
                    Array.isArray(ordData.items) && ordData.items.length > 0
                      ? ordData.items[0].menu_name +
                        (ordData.items.length > 1
                          ? ` + ${ordData.items.length - 1} lainnya`
                          : "")
                      : `Pesanan #${payload.orderId}`;
                  UI.renderOrderStatus(
                    String(payload.orderId),
                    itemSummary,
                    ordData.total_price || 0,
                  );
                }
                if (newState === "READY") {
                  // Notifikasi visual bahwa pesanan siap diambil
                  if (document.title)
                    document.title = "🔔 Pesanan Siap! - telFood";
                  setTimeout(() => {
                    document.title = "telFood - Smart Canteen";
                  }, 5000);
                }
                // Refresh estimasi waktu di booking page jika sedang dibuka
                if (
                  typeof UI !== "undefined" &&
                  typeof UI.updateEstimasiWaktu === "function"
                ) {
                  UI.updateEstimasiWaktu();
                }
              } catch (e) {
                console.warn("[socket.io] forceState error:", e);
              }
            }
          }
        });
      } catch (e) {
        console.warn("[socket.io] Failed to connect:", e.message);
      }
      async function initApp() {
        try {
          const resSidebar = await fetch("./partials/sidebar.html");
          const sidebarHtml = await resSidebar.text();
          document.getElementById("sidebar-placeholder").innerHTML =
            sidebarHtml;
          if (typeof lucide !== "undefined") lucide.createIcons();

          const avatar = document.getElementById("sidebar-avatar");
          if (avatar) avatar.src = "./assets/profile.png";
          const sidebarName = document.getElementById("sidebar-user-name");
          const sidebarEmail = document.getElementById("sidebar-user-email");
          if (CURRENT_USER && sidebarName)
            sidebarName.textContent = CURRENT_USER.name;
          if (CURRENT_USER && sidebarEmail)
            sidebarEmail.textContent = CURRENT_USER.email;

          const navContainer = document.querySelector(".sidebar-nav");

          if (CURRENT_ROLE === "siswa") {
            navContainer.innerHTML = `
            <a data-page="siswa-home" href="#" class="flex items-center gap-3 text-gray-400 hover:text-[#D2691E] p-2.5 rounded-xl transition-all">Home</a>
            <a data-page="siswa-booking" href="#" class="flex items-center gap-3 text-gray-400 hover:text-[#D2691E] p-2.5 rounded-xl transition-all">Pesan</a>
          `;
            setupNavigation();
            loadPage("siswa-home");
          } else if (CURRENT_ROLE === "owner") {
            navContainer.innerHTML = `
            <a data-page="owner-dashboard" href="#" class="nav-item flex items-center gap-3 p-3 rounded-xl text-sm text-gray-400 hover:text-[#C1500E] transition-all">Dashboard</a>
            <a data-page="owner-menu" href="#" class="nav-item flex items-center gap-3 p-3 rounded-xl text-sm text-gray-400 hover:text-[#C1500E] transition-all">Edit Menu</a>
            <a data-page="owner-status" href="#" class="nav-item flex items-center gap-3 p-3 rounded-xl text-sm text-gray-400 hover:text-[#C1500E] transition-all">Status Pesanan</a>
          `;
            setupNavigation();
            loadPage("owner-dashboard");
          }
        } catch (err) {
          console.error("Gagal inisialisasi aplikasi:", err);
        }
      }

      async function loadPage(pageName) {
        const contentArea = document.getElementById("main-content");
        let filePath = "";

        // ── Admin page guard ───────────────────────────────────────────────────
        const ownerPages = ["owner-dashboard", "owner-menu", "owner-status"];
        if (ownerPages.includes(pageName) && CURRENT_ROLE !== "owner") {
          console.warn(
            `[auth] siswa mencoba akses halaman owner: ${pageName} → redirect ke siswa-home`,
          );
          loadPage("siswa-home");
          return;
        }

        if (pageName === "siswa-home")
          filePath = "./pages/siswa/dashSiswa.html";
        else if (pageName === "siswa-booking")
          filePath = "./pages/siswa/booking.html";
        else if (pageName === "owner-dashboard")
          filePath = "./pages/owner/dashboard.html";
        else if (pageName === "owner-menu")
          filePath = "./pages/owner/edit-menu.html";
        else if (pageName === "owner-status")
          filePath = "./pages/owner/update_status.html";
        else if (pageName === "page-account")
          filePath = "./pages/account/index.html";

        try {
          const response = await fetch(filePath);
          if (!response.ok) throw new Error("Gagal ambil file");
          const htmlText = await response.text();

          contentArea.innerHTML = "";
          updateSidebarActive(pageName);

          // 1. Tempel langsung ke DOM pakai innerHTML (Cara native ini jauh lebih aman buat membaca SVG)
          contentArea.innerHTML = htmlText;

          // 2. Cari semua tag <script> yang ikut masuk, lalu eksekusi ulang
          const scripts = contentArea.querySelectorAll("script");

          for (const oldScript of scripts) {
            const newScript = document.createElement("script");

            // Jika script punya 'src', cukup salin atributnya
            if (oldScript.src) {
              newScript.src = oldScript.src;
            } else {
              // Jika script berupa inline code, gunakan textContent yang aman
              newScript.textContent = oldScript.textContent;
            }

            // Masukkan script ke body agar dieksekusi oleh browser
            document.body.appendChild(newScript);

            // Hapus tag script lama dari dalam contentArea agar tidak double
            oldScript.remove();
          }

          if (pageName === "siswa-home") {
            dashSiswa.renderTopMenu();
          }
          if (pageName === "siswa-booking") {
            await MenuTable.loadFromApi();
            booking.renderKantinSelect();
            booking.renderMenuGrid("");
            booking.renderOrderItems();
            UI.updateEstimasiWaktu(); // Update estimasi dari pesanan COOKING
            initBookingEvents(); // Pindahkan setup klik pesan siswa ke fungsi terpisah agar rapi
          }
          if (pageName === "page-account") {
            initAccountPage();
          }

          if (pageName === "owner-dashboard") {
            console.log("Owner Dashboard Stats Loaded");
            const user = CURRENT_USER;
            const kantinTitle = document.getElementById("kantin-title");
            console.log(user);
            if (user.role == "penjual" && kantinTitle) {
              kantinTitle.textContent =
                CURRENT_USER?.kantin_name ||
                CURRENT_USER?.name ||
                "Dashboard Kantin";
            }

            try {
              const res = await ApiClient.getOrderByKantin(
                CURRENT_USER.kantin_id,
              );
              console.log(res);
              const orders = res;
              const totalTransactions = orders.length;
              // const omzetToday = orders.reduce((sum, order) => {
              //   const createdAt = new Date(order.created_at);
              //   const today = new Date();
              //   if (
              //     createdAt.getDate() === today.getDate() &&
              //     createdAt.getMonth() === today.getMonth() &&
              //     createdAt.getFullYear() === today.getFullYear()
              //   ) {
              //     return sum + Number(order.total_price);
              //   }
              //   return sum;
              // }, 0);

              // const omzetElement = document.getElementById("omzet-hari-ini");
              // if (omzetElement) {
              //   omzetElement.textContent = `Rp ${Utils.formatCurrency(omzetToday)}`;
              // }

              const totalTransaksiElement =
                document.getElementById("total-transaksi");
              if (totalTransaksiElement) {
                totalTransaksiElement.textContent = String(totalTransactions);
              }
            } catch (err) {
              console.error("Gagal load data dashboard:", err);
            }
          }
          if (pageName === "owner-menu") {
            console.log("Owner Dashboard Stats Loaded");
            const user = CURRENT_USER;
            const kantinTitle = document.getElementById("kantin-title");
            console.log(user);
            if (user.role == "penjual" && kantinTitle) {
              kantinTitle.textContent =
                CURRENT_USER?.kantin_name ||
                CURRENT_USER?.name ||
                "Dashboard Kantin";
            }
            setTimeout(() => {
              if (typeof renderMenu === "function") renderMenu();
            }, 1000); // Tunggu 100ms
          }
          if (pageName === "owner-status" && typeof initKanban === "function") {
            console.log("Owner Dashboard Stats Loaded");
            const user = CURRENT_USER;
            const kantinTitle = document.getElementById("kantin-title");
            console.log(user);
            if (user.role == "penjual" && kantinTitle) {
              kantinTitle.textContent =
                CURRENT_USER?.kantin_name ||
                CURRENT_USER?.name ||
                "Dashboard Kantin";
            }
            initKanban();
          }

          // Render Lucide icons in the newly loaded page content
          if (typeof lucide !== "undefined") lucide.createIcons();
        } catch (err) {
          console.error("Gagal load halaman:", err);
          contentArea.innerHTML = `<h2 class="text-red-500 font-bold p-5">Halaman tidak ditemukan: ${pageName}</h2>`;
        }
      }

      function setupNavigation() {
        document.body.addEventListener("click", (e) => {
          const link = e.target.closest("a[data-page]");
          if (link) {
            e.preventDefault();
            const page = link.getAttribute("data-page");
            loadPage(page);
          }
        });
      }

      function updateSidebarActive(pageName) {
        document.querySelectorAll(".sidebar-nav a").forEach((nav) => {
          if (nav.getAttribute("data-page") === pageName) {
            nav.classList.add("active-menu", "text-[#D2691E]");
            nav.classList.remove("text-gray-400");
          } else {
            nav.classList.remove("active-menu", "text-[#D2691E]");
            nav.classList.add("text-gray-400");
          }
        });
      }

      function initBookingEvents() {
        const pesanBtn = document.getElementById("pesanBtn");
        if (!pesanBtn) return;

        pesanBtn.replaceWith(pesanBtn.cloneNode(true));
        const newPesanBtn = document.getElementById("pesanBtn");

        newPesanBtn.addEventListener("click", async () => {
          const nama = document.getElementById("namaInput")?.value?.trim();
          const kantin = document.getElementById("kantinSelect")?.value;

          const valid = Utils.validateNama(nama);
          if (!valid.valid) {
            alert(valid.message);
            return;
          }
          if (!kantin) {
            alert("Pilih kantin terlebih dahulu");
            return;
          }
          if (Cart.isEmpty()) {
            alert("Pilih menu terlebih dahulu!");
            return;
          }

          newPesanBtn.disabled = true;
          newPesanBtn.textContent = "Memproses...";

          const items = Cart.getItems();
          const summary =
            items[0].menuItem.name +
            (items.length > 1 ? ` + ${items.length - 1} lainnya` : "");
          let total = Cart.getTotal();

          OrderStateMachine.reset();

          try {
            if (ApiClient.isAuthenticated() && MenuTable.isApiBacked()) {
              const payload = {
                kantin_id: Number(kantin),
                customer_name: nama,
                items: items.map((item) => ({
                  menu_id: Number(item.menuItem.id),
                  quantity: item.quantity,
                })),
              };

              if (
                !Number.isInteger(payload.kantin_id) ||
                payload.items.some((item) => !Number.isInteger(item.menu_id))
              ) {
                throw new Error("Data menu belum sinkron dengan backend");
              }

              const order = await ApiClient.createOrder(payload);
              total = Number(order.total_price);
              // Simpan orderId aktif agar real-time update bisa filter pesanan ini
              if (OrderStateMachine.setActiveOrderId) {
                OrderStateMachine.setActiveOrderId(order.id);
              }
              OrderStateMachine.transition(OrderStateMachine.STATES.ORDERED);
              UI.renderOrderStatus(String(order.id), summary, total);
            } else {
              const orderId = Utils.generateOrderId();
              OrderStateMachine.transition(OrderStateMachine.STATES.ORDERED);
              UI.renderOrderStatus(orderId, summary, total);

              setTimeout(() => {
                OrderStateMachine.transition(OrderStateMachine.STATES.COOKING);
                UI.renderOrderStatus(orderId, summary, total);
              }, 3000);
              setTimeout(() => {
                OrderStateMachine.transition(OrderStateMachine.STATES.READY);
                UI.renderOrderStatus(orderId, summary, total);
              }, 6000);
              setTimeout(() => {
                OrderStateMachine.transition(OrderStateMachine.STATES.DONE);
                UI.renderOrderStatus(orderId, summary, total);
              }, 9000);
            }

            Cart.clearCart();
            booking.renderOrderItems();
          } catch (err) {
            alert(err.message || "Gagal membuat pesanan");
          } finally {
            newPesanBtn.disabled = false;
            newPesanBtn.textContent = "Pesan Sekarang";
          }
        });
      }

      function initAccountPage() {
        const orders = [
          {
            id: "#78093",
            date: "Rabu, 25 April 2026",
            pesan: [
              { menu: "Nasi Goreng Mozarella", qty: 1 },
              { menu: "Es Teh Manis", qty: 1 },
            ],
            canteen: "Kantin NEO 1",
            total: "Rp 15.000",
          },
          {
            id: "#78094",
            date: "Selasa, 24 April 2026",
            pesan: [
              { menu: "Mie Ayam Spesial", qty: 2 },
              { menu: "Jus Alpukat", qty: 1 },
            ],
            canteen: "Kantin NEO 2",
            total: "Rp 28.000",
          },
          {
            id: "#78095",
            date: "Senin, 23 April 2026",
            pesan: [{ menu: "Soto Ayam", qty: 1 }],
            canteen: "Kantin NEO 1",
            total: "Rp 12.000",
          },
        ];

        const container = document.getElementById("history-container");
        if (!container) {
          console.log("container history masih null!");
          return;
        }

        container.innerHTML = orders
          .map(
            (order) => `
    <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 hover:border-[#C1500E] transition-colors">
      <div class="flex items-start justify-between gap-4">
        <div>${order.pesan.map((item) => `<p class="text-sm text-gray-700">${item.qty}x <span class="font-medium">${item.menu}</span></p>`).join("")}</div>
        <div class="text-right">
          <p class="text-sm font-bold text-gray-800">${order.canteen}</p>
          <p class="text-xs text-gray-400 mt-0.5">${order.date}</p>
        </div>
      </div>
      <div class="flex justify-between mt-3 pt-3 border-t border-gray-100">
        <span class="text-xs text-gray-400 font-mono">${order.id}</span>
        <span class="text-xs font-bold text-[#C1500E]">${order.total}</span>
      </div>
    </div>
  `,
          )
          .join("");

        const searchInput = document.getElementById("search");
        if (searchInput) {
          searchInput.addEventListener("input", (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = orders.filter(
              (order) =>
                order.pesan.some((item) =>
                  item.menu.toLowerCase().includes(keyword),
                ) || order.canteen.toLowerCase().includes(keyword),
            );
            container.innerHTML = filtered
              .map(
                (order) => `
        <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 hover:border-[#C1500E] transition-colors">
          <div class="flex items-start justify-between gap-4">
            <div>${order.pesan.map((item) => `<p class="text-sm text-gray-700">${item.qty}x <span class="font-medium">${item.menu}</span></p>`).join("")}</div>
            <div class="text-right">
              <p class="text-sm font-bold text-gray-800">${order.canteen}</p>
              <p class="text-xs text-gray-400 mt-0.5">${order.date}</p>
            </div>
          </div>
          <div class="flex justify-between mt-3 pt-3 border-t border-gray-100">
            <span class="text-xs text-gray-400 font-mono">${order.id}</span>
            <span class="text-xs font-bold text-[#C1500E]">${order.total}</span>
          </div>
        </div>
      `,
              )
              .join("");
          });
        }
      }

      window.onload = initApp;
    </script>
  </body>
</html>
